services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./models/model_rubert-tiny1.pt:/models/model_rubert-tiny1.pt:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    ports:
      - "5004:5004"
    environment:
      BACKEND_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
